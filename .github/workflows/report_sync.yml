name: iCaiu Sync

on:
  repository_dispatch:
    types: [google_token_ready]
  # workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step de delay para evitar conflito de Rate Limit com o Zoho/Google
      - name: Wait for API Rate Limit (3 minutes)
        run: sleep 180
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install axios
      
      - name: Execute Sync
        run: node report-sync.js
        env:
          GOOGLE_TOKEN:  ${{ secrets.GOOGLE_TOKEN }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_ACCOUNT_OWNER: ${{ secrets.ZOHO_ACCOUNT_OWNER }}
          REPORT_COLUMN_MAPPING: ${{ secrets.REPORT_COLUMN_MAPPING }}
          REPORT_SPREADSHEET_ID: ${{ secrets.REPORT_SPREADSHEET_ID }}
          REPORT_SHEET_NAME: ${{ secrets.REPORT_SHEET_NAME }}
          ZOHO_APP_NAME: ${{ secrets.ZOHO_APP_LINK_NAME }}
          ZOHO_REPORT_NAME: ${{ secrets.ZOHO_REPORT_ICAIU }}
