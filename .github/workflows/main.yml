name: Zoho Worker Sync (Node.js)

on:
  repository_dispatch:
    types: [google_token_ready]

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Mascarar Dados Sensíveis
        run: |
          echo "::add-mask::${{ github.event.client_payload.token }}"
          echo "::add-mask::${{ secrets.ZOHO_CLIENT_SECRET }}"
          echo "::add-mask::${{ secrets.ZOHO_REFRESH_TOKEN }}"

      - name: Install dependencies
        run: npm install axios

      - name: Execute Sync Logic
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
          GOOGLE_TOKEN: ${{ github.event.client_payload.token }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          COLUMN_MAPPING: ${{ secrets.COLUMN_MAPPING }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNT_OWNER: ${{ secrets.ZOHO_ACCOUNT_OWNER }}
          ZOHO_APP_LINK_NAME: ${{ secrets.ZOHO_APP_LINK_NAME }}
          ZOHO_REPORT_LINK_NAME: ${{ secrets.ZOHO_REPORT_LINK_NAME }}
        run: node index.js
